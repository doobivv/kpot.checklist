  .info-section-body { display: none; }

  .info-row { padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--border); }

  .info-row-label { font-size: 0.75rem; font-weight: 600; color: var(--white); margin-bottom: 0.25rem; }
  .info-row-value { color: var(--gray-light); font-size: 0.82rem; line-height: 1.5; }
  .allergen-tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 0.15rem 0.55rem; font-size: 0.68rem; color: var(--gray-light); margin: 0.15rem 0.15rem 0 0; }

  .info-text:last-child { border-bottom: none; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; justify-content: center; }

  .modal-btns { display: flex; gap: 0.6rem; margin-top: 0.8rem; }

  .btn-cancel { background: var(--gray-mid); border: 1px solid var(--border); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 0.75rem 1.2rem; border-radius: 12px; cursor: pointer; }
  .history-entry { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 0.8rem; overflow: hidden; }
  .history-head { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem; background: var(--surface); cursor: pointer; }
  .history-date { font-size: 0.8rem; font-weight: 600; }
  .history-meta { font-size: 0.7rem; color: var(--gray-light); margin-top: 0.1rem; }
  .history-badge { font-size: 0.68rem; background: var(--red); color: var(--white); padding: 0.25rem 0.7rem; border-radius: 20px; font-weight: 600; }

</head>

</div>

<div id="infoScreen" class="screen">

    <div class="topbar-left">
      <button class="back-btn" onclick="goHome()">← Home</button>

  <div class="info-content" id="infoContent"></div>
</div>

  </div>
</div>

let currentUser=null, pinBuffer='', currentTab=0, currentInfoTab=0;
let state={}, commentTarget=null, showingHistory=false;

function getESTTimestamp() {
  return new Date().toLocaleString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) + ' EST';
}
function getESTDate() {
  return new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York', weekday: 'short', month: 'short', day: 'numeric' });
}
function loadLocalState() { try { const s=localStorage.getItem('kpot_s'); if(s) state=JSON.parse(s); } catch(e){} }
function saveLocalState() { try { localStorage.setItem('kpot_s', JSON.stringify(state)); } catch(e){} }
function getKey(t,s,i) { return t+'__'+s+'__'+i; }
function getTabStats(ti) { const l=LISTS[ti]; const ts=state[ti]||{}; let tot=0,dn=0; for(const[s,items]of Object.entries(l.sections)) items.forEach((_,i)=>{ tot++; if(ts[getKey(ti,s,i)]?.done) dn++; }); return {total:tot,done:dn,pct:tot>0?Math.round((dn/tot)*100):0}; }
function renderTabProgressRow() { const row=document.getElementById('tabProgressRow'); row.innerHTML=''; Object.keys(LISTS).forEach(i=>{ const{pct}=getTabStats(parseInt(i)); const cell=document.createElement('div'); cell.className='tab-progress-cell'; cell.innerHTML='<div class="tab-prog-label"><span>'+LISTS[i].name+'</span><span class="tab-prog-pct">'+pct+'%</span></div><div class="tab-prog-track"><div class="tab-prog-fill" style="width:'+pct+'%"></div></div>'; row.appendChild(cell); }); }
function numPress(n) { if(pinBuffer.length>=4)return; pinBuffer+=n; updateDots(); if(pinBuffer.length===4)setTimeout(tryLogin,150); }
function numDel() { pinBuffer=pinBuffer.slice(0,-1); updateDots(); document.getElementById('errorMsg').textContent=''; }
function updateDots() { for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length); }
function tryLogin() { if(USERS[pinBuffer]){currentUser=USERS[pinBuffer];showHomeScreen();}else{document.getElementById('errorMsg').textContent='Incorrect PIN. Try again.';pinBuffer='';updateDots();} }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('historyPane').style.display='none'; }
function showHomeScreen() { loadLocalState(); document.getElementById('homeUser').textContent=currentUser; showScreen('homeScreen'); }
function showDaily() { showScreen('dailyScreen'); document.getElementById('userLabel').textContent=currentUser; document.getElementById('dateLabel').textContent=getESTDate(); showingHistory=false; document.getElementById('navChecklist').classList.add('active'); document.getElementById('navHistory').classList.remove('active'); document.getElementById('checklistContent').style.display=''; document.getElementById('progressSummary').style.display=''; document.getElementById('tabProgressRow').style.display=''; renderTabProgressRow(); renderChecklist(); }
function showInfo() { showScreen('infoScreen'); document.getElementById('infoUserLabel').textContent=currentUser; currentInfoTab=0; document.querySelectorAll('#infoScreen .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0)); renderInfoTab(); }
function goHome() { showScreen('homeScreen'); }
function logout() { saveShiftToFirebase(); }
async function saveShiftToFirebase() {
  const totalDone=countAllDone();
  if(totalDone===0){doLogout();return;}
  try { await db.collection('sessions').add({ date:getESTTimestamp(), user:currentUser, tabs:JSON.parse(JSON.stringify(state)), totalDone:totalDone, timestamp:firebase.firestore.FieldValue.serverTimestamp() }); } catch(e){ console.error('Firebase save error:',e); }
  state={}; saveLocalState(); doLogout();
}
function doLogout() { currentUser=null; pinBuffer=''; updateDots(); document.getElementById('errorMsg').textContent=''; showScreen('loginScreen'); }
function countAllDone() { let n=0; for(const t in state) for(const k in state[t]) if(state[t][k].done) n++; return n; }
function switchTab(idx) { currentTab=idx; document.querySelectorAll('#dailyScreen .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx)); if(!showingHistory) renderChecklist(); }
function switchInfoTab(idx) { currentInfoTab=idx; document.querySelectorAll('#infoScreen .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx)); renderInfoTab(); }
function showChecklist() { showingHistory=false; document.getElementById('navChecklist').classList.add('active'); document.getElementById('navHistory').classList.remove('active'); document.getElementById('checklistContent').style.display=''; document.getElementById('progressSummary').style.display=''; document.getElementById('tabProgressRow').style.display=''; document.getElementById('historyPane').style.display='none'; renderChecklist(); }
function showHistory() { showingHistory=true; document.getElementById('navHistory').classList.add('active'); document.getElementById('navChecklist').classList.remove('active'); document.getElementById('checklistContent').style.display='none'; document.getElementById('progressSummary').style.display='none'; document.getElementById('tabProgressRow').style.display='none'; const pane=document.getElementById('historyPane'); pane.style.display='block'; pane.innerHTML='<div class="history-loading">Loading sessions...</div>'; loadHistoryFromFirebase(pane); }
async function loadHistoryFromFirebase(pane) {
  try {
    const snapshot=await db.collection('sessions').orderBy('timestamp','desc').limit(50).get();
    if(snapshot.empty){pane.innerHTML='<div class="history-loading">No saved sessions yet.</div>';return;}
    pane.innerHTML='<div style="font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gray-light);margin-bottom:1rem;">Recent Sessions</div>';
    snapshot.forEach((doc)=>{
      const entry=doc.data(); const div=document.createElement('div'); div.className='history-entry';
      let lines='';
      for(const tab in entry.tabs){ lines+='<div style="color:var(--red);font-size:0.7rem;text-transform:uppercase;margin-top:0.6rem;margin-bottom:0.2rem">'+(LISTS[tab]?.name||tab)+'</div>'; for(const[sec,items]of Object.entries(LISTS[tab]?.sections||{})) items.forEach((item,idx)=>{ const s=entry.tabs[tab][getKey(tab,sec,idx)]; if(s) lines+='<div class="'+(s.done?'history-item-done':'')+'">'+(s.done?'✓':'○')+' '+item+(s.comment?' <em style="font-size:0.72rem;color:#888">— '+s.comment+'</em>':'')+'</div>'; }); }
      const id='hb_'+doc.id;
      div.innerHTML='<div class="history-head" onclick="document.getElementById(\''+id+'\').classList.toggle(\'open\')"><div><div class="history-date">'+entry.date+'</div><div class="history-meta">by '+entry.user+'</div></div><span class="history-badge">'+entry.totalDone+' done</span></div><div class="history-body" id="'+id+'">'+lines+'</div>';
      pane.appendChild(div);
    });
  } catch(e){ pane.innerHTML='<div class="history-loading">Error loading history. Check connection.</div>'; console.error(e); }
}
function renderChecklist() {
  const list=LISTS[currentTab]; const tabState=state[currentTab]||(state[currentTab]={}); const content=document.getElementById('checklistContent'); content.innerHTML=''; let total=0,done=0;
  for(const[section,items]of Object.entries(list.sections)){ const hdr=document.createElement('div'); hdr.className='section-header'; hdr.textContent=section; content.appendChild(hdr); items.forEach((item,idx)=>{ const key=getKey(currentTab,section,idx); const s=tabState[key]||{done:false,comment:''}; tabState[key]=s; total++; if(s.done) done++; const row=document.createElement('div'); row.className='checklist-item'+(s.done?' done':''); row.innerHTML='<div class="check-box"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="item-text">'+item+(s.comment?'<div class="item-comment">📝 '+s.comment+'</div>':'')+'</div><button class="comment-btn">💬</button>'; row.querySelector('.check-box').addEventListener('click',e=>{e.stopPropagation();s.done=!s.done;saveLocalState();renderChecklist();}); row.querySelector('.item-text').addEventListener('click',()=>{s.done=!s.done;saveLocalState();renderChecklist();}); row.querySelector('.comment-btn').addEventListener('click',e=>{e.stopPropagation();commentTarget={key,s};document.getElementById('commentInput').value=s.comment||'';document.getElementById('commentModal').classList.add('open');}); content.appendChild(row); }); }
  const pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('progressSummary').innerHTML='<span class="progress-count">'+done+'/'+total+'</span> items completed &nbsp;·&nbsp; <span style="color:var(--red);font-weight:600">'+pct+'%</span> this tab';
  renderTabProgressRow();
}
function renderInfoTab() {
  const data=INFO[currentInfoTab]; const content=document.getElementById('infoContent'); content.innerHTML='';
  data.sections.forEach((sec)=>{ const wrap=document.createElement('div'); wrap.className='info-section'; const head=document.createElement('div'); head.className='info-section-header'; head.innerHTML=sec.title+'<span>›</span>'; const body=document.createElement('div'); body.className='info-section-body open'; head.addEventListener('click',()=>body.classList.toggle('open')); if(sec.text){const t=document.createElement('div');t.className='info-text';t.textContent=sec.text;body.appendChild(t);} if(sec.items)sec.items.forEach(item=>{const row=document.createElement('div');row.className='info-row';row.innerHTML='<div class="info-row-label">'+item.label+'</div><div class="info-row-value">'+item.value+'</div>';body.appendChild(row);}); if(sec.allergens)sec.allergens.forEach(a=>{const row=document.createElement('div');row.className='info-row';const tags=a.tags.map(t=>'<span class="allergen-tag'+(a.warn.some(w=>t.includes(w))?' warn':'')+'">'+t+'</span>').join('');row.innerHTML='<div class="info-row-label">'+a.item+'</div><div>'+tags+'</div>';body.appendChild(row);}); wrap.appendChild(head); wrap.appendChild(body); content.appendChild(wrap); });
}
function closeComment(){document.getElementById('commentModal').classList.remove('open');commentTarget=null;}
function saveComment(){if(commentTarget){commentTarget.s.comment=document.getElementById('commentInput').value.trim();saveLocalState();renderChecklist();}closeComment();}
loadLocalState();
</script>
